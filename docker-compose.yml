services:
  mysql:
    image: mysql:8.0
    container_name: pichon_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: pichon_db
      MYSQL_USER: pichon_user
      MYSQL_PASSWORD: pichon_pass
    volumes:
      - mysql_data:/var/lib/mysql
      - ./logs/mysql:/var/log/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: pichon_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 64M
    depends_on:
      mysql:
        condition: service_healthy

  websocket-server:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pichon_ws
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: pichon_user
      DB_PASS: pichon_pass
      DB_NAME: pichon_db
      WS_PORT: 8081
    volumes:
      - ./backend:/app
    depends_on:
      mysql:
        condition: service_healthy  

volumes:
  mysql_data:

