<div class="d-flex vh-100">
    <app-sidebar class="w-25 flex-shrink-0" />
    <div class="d-flex flex-column flex-grow-1" style="min-width:0;">
        @if (selectedUser) {
        <div class="border rounded-3 mx-0 mb-1 d-flex align-items-center px-3 gap-2" style="height:100px;">
            <img [src]="selectedUser.img ? apiBaseUrl + '/img/' + selectedUser.img : 'assets/default-avatar.jpg'" (error)="onImageError($event)" alt="avatar"
                style="width:60px;height:60px;border-radius:50%;object-fit:cover;" />
            <span class="fw-bold">{{ selectedUser.alias }}</span>

        </div>
        <div #msgContainer class="msgContainer d-flex flex-column p-2" style="height:82%;overflow-y:auto;">
            @for (msg of messages; track $index) {
                
            <div class="mb-1 p-2 rounded shadow-sm text-break" [class.ms-auto]="msg.side === 'outgoing'"
                [class.me-auto]="msg.side !== 'outgoing'" [class.message-outgoing]="msg.side === 'outgoing'"
                [class.bg-light]="msg.side !== 'outgoing'"
                style="max-width:70%; white-space:pre-wrap; overflow-wrap:break-word; word-break:break-word;">
                {{ msg.data }}
                <div class="msg-time">{{ (msg.fecha + 'Z') | date:'HH:mm' }}</div>
            </div>
            {{ scrollearAbajo() }}
            }
        </div>
        } @else {
        <div class="d-flex flex-column justify-content-center align-items-center flex-grow-1 bg-light">
            <p class="text-muted fs-5">Seleccioná un usuario para empezar a chatear</p>
        </div>
        }
        <div class=" d-flex justify-content-center align-items-center" style="height:10%;">
            <form id="chat-form" [formGroup]="chatForm" (ngSubmit)="enviarMensaje()">
                <div class="input-group h-100">
                    <textarea #mensajeInput formControlName="mensaje" (keydown.enter)="manejadorTeclaEnter($event)"
                        class="form-control" placeholder="Escribe algo..." rows="1" style="resize:none;"></textarea>
                    <button class="btn btn-primary" type="submit"
                        [disabled]="chatForm.invalid || !selectedUser">Enviar</button>
                </div>
            </form>
        </div>
    </div>
</div>
