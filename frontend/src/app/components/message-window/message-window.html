<div class="d-flex flex-column vh-100">
    <div style="border: 1px solid #000000; background-color: rgb(236, 236, 236); height: 90%;"
        class="d-flex justify-content-center align-items-center">[messages]</div>

    <div style="border: 1px solid #000000; background-color: rgb(236, 236, 236); height: 10%;"
        class="d-flex justify-content-center align-items-center">
        <form id="chat-form" [formGroup]="chatForm" (ngSubmit)="enviarMensaje()">
            <div class="input-group h-100">
                <textarea formControlName="mensaje" class="form-control" placeholder="Escribe algo..." rows="1"
                    style="resize: none;">
                </textarea>
                <button class="btn btn-primary" type="submit" [disabled]="chatForm.invalid">
                    Enviar
                </button>
            </div>
        </form>
    </div>
</div>
