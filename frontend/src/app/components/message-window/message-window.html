<div class="d-flex vh-100">
    <app-sidebar class="w-25" />
    <div class="d-flex flex-column flex-grow-1">
        @if (selectedUser) {
        <div class="border bg-light d-flex align-items-center px-3 gap-2" style="height:100px;">
            @if (selectedUser.img) {
            <img
            [src]="user.img
                ? apiBaseUrl + '/img/' + selectedUser.img
                : 'assets/default-avatar.jpg'"
            (error)="onImageError($event)"
            alt="avatar"
            style="width:60px;height:60px;border-radius:50%;object-fit:cover;" />
            }
            <span class="fw-bold">{{ selectedUser.alias }}</span>
        </div> 
        <div #msgContainer class="border bg-light d-flex flex-column p-2" style="height:82%;overflow-y:auto;">
            @for (msg of messages; track $index) {
            <div class="mb-1 p-2 rounded shadow-sm" [class.ms-auto]="msg.side === 'outgoing'"
                [class.me-auto]="msg.side !== 'outgoing'" [class.bg-primary]="msg.side === 'outgoing'"
                [class.text-white]="msg.side === 'outgoing'" [class.bg-white]="msg.side !== 'outgoing'"
                style="max-width:70%;">
                {{ msg.data }}
            </div>
            {{ scrollearAbajo() }}
            }
        </div>
        } @else {
        <div class="d-flex flex-column justify-content-center align-items-center flex-grow-1 bg-light">
            <p class="text-muted fs-5">Seleccioná un usuario para empezar a chatear</p>
        </div>
        }
        <div class="border bg-light d-flex justify-content-center align-items-center" style="height:10%;">
            <form id="chat-form" [formGroup]="chatForm" (ngSubmit)="enviarMensaje()">
                <div class="input-group h-100">
                    <textarea formControlName="mensaje" (keydown.enter)="manejadorTeclaEnter($event)"
                        class="form-control" placeholder="Escribe algo..." rows="1" style="resize:none;"></textarea>
                    <button class="btn btn-primary" type="submit"
                        [disabled]="chatForm.invalid || !selectedUser">Enviar</button>
                </div>
            </form>
        </div>
    </div>
</div>
