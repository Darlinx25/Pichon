<div id="formulario" class="p-3 d-flex flex-column justify-content-center align-items-center">
    <h1 class="p-3">RECUPERACIÓN</h1>
    <form [formGroup]="recoveryForm" (ngSubmit)="onSubmit()">
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-30" for="title">Email</label>
            <div class="w-70">
                <input class="form-control" id="email" formControlName="email" type="email" />
            </div>
        </div>
        
        <div class="d-flex justify-content-end">
            <button class="btn btn-primary" [disabled]="!recoveryForm.valid" type="submit">ENVIAR</button>
        </div>
    </form>
    <div class="d-flex gap-3 mt-3">
        <a class="link-primary" routerLink="/login">Regresar a inicio</a>
    </div>
    
</div>
