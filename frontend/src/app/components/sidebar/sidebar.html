<div class="d-flex flex-column vh-100 border-start border-end rounded-3">

    <div class="position-relative p-3 " style="height:100px;z-index:1000; ">
        <div class="d-flex gap-3 align-items-start ">
            <form [formGroup]="searchForm">
                <input id="busqueda" formControlName="busqueda" class="form-control" type="search"
                    placeholder="buscar usuario" aria-label="buscar usuario" />
            </form>
            <a class="btn btn-primary" routerLink="/usuarios">Usuarios</a>
        </div>

        @if (usuariosEncontrados.length > 0) {
        <div class="position-absolute shadow" style="
                    top: calc(100% - 10px);
                    left: 8px;
                    right: 8px;
                    max-height: 300px;
                    overflow-y: auto;
                    z-index: 99999;
                    border: 1px solid rgba(200, 210, 220, 0.12);
                    border-radius: 8px;
                    background: #1a1d21;">
            @for (usuario of usuariosEncontrados; track usuario.id) {
            <div class="d-flex align-items-center gap-2 p-2 border-bottom" style="cursor:pointer;"
                (click)="seleccionarUsuario(usuario)">
                <img [src]="usuario.img
                        ? apiBaseUrl + '/img/' + usuario.img
                        : 'assets/default-avatar.jpg'" (error)="onImageError($event)" alt="avatar"
                    style="width:60px;height:60px;border-radius:50%;object-fit:cover;" />
                <span>{{ usuario.alias }}</span>
            </div>
            }
        </div>
        }
    </div>

    <ul class="nav nav-pills ps-3">
        <li class="nav-item">
            <button class="nav-link active" id="chat-tab" data-bs-toggle="tab" data-bs-target="#chat" type="button">
                Chats
            </button>
        </li>
        <li class="nav-item">
            <button class="nav-link" id="contactos-tab" data-bs-toggle="tab" data-bs-target="#contactos" type="button">
                Contactos
            </button>
        </li>
    </ul>

    <div class="tab-content flex-grow-1  overflow-hidden">

        <div class="tab-pane fade show active h-100" id="chat" role="tabpanel" aria-labelledby="chat-tab">
            <div class="h-100 overflow-auto p-2">
                @for (user of listaUsuarios; track user.id) {
                <div class="user-item py-4 mb-2 ps-3" (click)="seleccionarUsuario(user)" [class.user-selected]="usuarioSeleccionado?.id === user.id" style="cursor:pointer;">
                    <img [src]="user.img
                            ? apiBaseUrl + '/img/' + user.img
                            : 'assets/default-avatar.jpg'" (error)="onImageError($event)" alt="avatar"
                        style="width:60px;height:60px;border-radius:50%;object-fit:cover;" />
                    {{ user.alias }}
                </div>
                }
            </div>
        </div>

        <div class="tab-pane fade h-100" id="contactos" role="tabpanel" aria-labelledby="contactos-tab">
            <div class="h-100 overflow-auto p-2">
                @for (user of contactos; track user.id) {
                <div class="user-item py-4 mb-2 ps-3" (click)="seleccionarUsuario(user)" style="cursor:pointer;">
                    <img [src]="user.img
                            ? apiBaseUrl + '/img/' + user.img
                            : 'assets/default-avatar.jpg'" (error)="onImageError($event)" alt="avatar"
                        style="width:60px;height:60px;border-radius:50%;object-fit:cover;" />
                    {{ user.alias }}
                </div>
                }
            </div>
        </div>

    </div>

    <div class="border rounded-3 d-flex justify-content-start p-2 align-items-center gap-2 mx-1 mb-1"
        style="height:10%;">
        <img [src]="user.img
                ? apiBaseUrl + '/img/' + user.img
                : 'assets/default-avatar.jpg'" (error)="onImageError($event)" alt="avatar"
            style="width:60px;height:60px;border-radius:50%;object-fit:cover;" />
        <span>{{ user.alias }}</span>
        <a class="btn btn-primary btn-sm" [routerLink]="['/perfil', user.id]">Perfil</a>
        <button class="btn btn-danger btn-sm" (click)="cerrarSesion()">Cerrar sesión</button>
    </div>

</div>
