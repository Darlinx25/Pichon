<div id="formulario" class="p-3 d-flex flex-column justify-content-center align-items-center">
    <h1 class="p-3">NUEVA CONTRASEÑA</h1>
    <p [class.text-success]="success" [class.text-danger]="!success">{{ mensaje }}</p>
    <form [formGroup]="passwordResetForm" (ngSubmit)="onSubmit()">
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="description">Contraseña</label>
            <div class="w-75">
                <input class="form-control" id="password" formControlName="password" type="password" />
            </div>
        </div>
        
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="description">Confirmar contraseña</label>
            <div class="w-75">
                <input class="form-control" id="confirmPassword" formControlName="confirmPassword" type="password" />
            </div>
        </div>
        
        <div class="d-flex justify-content-end">
            <button class="btn btn-primary" [disabled]="!passwordResetForm.valid" type="submit">ENVIAR</button>
        </div>
    </form>
    <div class="d-flex gap-3 mt-3">
        <a class="link-primary" routerLink="/login">Regresar a inicio</a>
    </div>
    
</div>
