<div id="formulario" class="p-3 d-flex flex-column justify-content-center align-items-center">
    <h1 class="p-3">EDITAR PERFIL</h1>
    <p class="text-success" *ngIf="successMessage">{{ successMessage }}</p>
    <p class="text-danger" *ngIf="errorMessage">{{ errorMessage }}</p>
    <div class="upload-zone border border-2 border-primary border-dashed rounded-4 p-4 text-center bg-light shadow-sm mx-auto mb-4"
        style="max-width: 500px;" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)"
        (drop)="onDrop($event)">

        <div class="upload-overlay" *ngIf="isDragging">
            <div class="text-center">
                <i class="bi bi-cloud-arrow-up-fill fs-1 d-block mb-2"></i>
                <div>Soltar para subir imagen</div>
            </div>
        </div>

        <img [src]="imagePreview
            ? imagePreview
            : (perfilData?.img
                ? apiBaseUrl + '/img/' + perfilData.img
                : 'assets/default-avatar.jpg')" (error)="onImageError($event)" alt="avatar"
            class="avatar-preview rounded-4 shadow mb-3">

        <i class="bi bi-cloud-arrow-up fs-1 text-primary"></i>

        <h5 class="fw-bold mt-2">
            Imagen de perfil
        </h5>

        <p class="text-muted">
            Arrastra una imagen aquí o selecciona un archivo
        </p>

        <label class="btn btn-outline-primary">
            Elegir imagen
            <input hidden type="file" accept="image/*" (change)="onFileSelected($event)">
        </label>

    </div>

    <form (ngSubmit)="onSubmit()" [formGroup]="editForm">
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="email">Email</label>
            <div class="w-75">
                <input class="form-control" id="email" formControlName="email" type="email" />
            </div>
        </div>
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="alias">Alias</label>
            <div class="w-75">
                <input class="form-control" id="alias" formControlName="alias" type="text" />
            </div>
        </div>
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="estado">Estado</label>
            <div class="w-75">
                <input class="form-control" id="estado" formControlName="estado" type="text" />
            </div>
        </div>
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="genero">Género</label>
            <div class="w-75">
                <select class="form-select" id="genero" formControlName="genero">
                    <option value="">Seleccionar...</option>
                    <option value="Hombre">Hombre</option>
                    <option value="Mujer">Mujer</option>
                </select>
            </div>
        </div>
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="fecha_nacimiento">Fecha Nac.</label>
            <div class="w-75">
                <input class="form-control" id="fecha_nacimiento" formControlName="fecha_nacimiento" type="date" />
            </div>
        </div>
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="idioma">Idioma</label>
            <div class="w-75">
                <select class="form-select" id="idioma" formControlName="idioma">
                    <option value="">Seleccionar...</option>
                    <option value="Español">Español</option>
                    <option value="Inglés">Inglés</option>
                </select>
            </div>
        </div>
        <div class="d-flex gap-3 mt-4 justify-content-center">
            <button type="submit" class="btn btn-primary">
                Guardar cambios
            </button>
            <a [routerLink]="['/perfil', user.id]" class="btn btn-primary">Regresar</a>
        </div>
    </form>
</div>
