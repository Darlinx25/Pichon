<div id="formulario" class="p-3 d-flex flex-column justify-content-center align-items-center">
    <h1 class="p-3">PERFIL</h1>

    <div class="mb-4">
        @if (user.img) {
        <img [src]="apiBaseUrl + '/img/' + user.img" alt="avatar"
            style="border-radius:10%; width:220px; height:220px; object-fit:cover;" />
        } @else {
        <img src="assets/default-avatar.jpg" alt="avatar"
            style="border-radius:10%; width:220px; height:220px; object-fit:cover;" />
        }
    </div>
    <div class="d-flex flex-column gap-2">
        <div>
            <strong>Usuario:</strong> {{ user.username }}
        </div>

        <div>
            <strong>Alias:</strong> {{ user.alias }}
        </div>

        <div>
            <strong>Correo:</strong> {{ user.email }}
        </div>
    </div>
    <div class="d-flex gap-3 mt-4">
        <a routerLink="/chat" class="btn btn-primary">
            Regresar
        </a>

        <button class="btn btn-danger" (click)="cerrarSesion()">
            Cerrar sesión
        </button>
    </div>

</div>
