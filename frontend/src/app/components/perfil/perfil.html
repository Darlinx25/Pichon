<div id="formulario" class="p-3 d-flex flex-column justify-content-center align-items-center">
    <h1 class="p-3">PERFIL</h1>
    <div class="mb-4">
        <img [src]="perfilData.img
                ? apiBaseUrl + '/img/' + perfilData.img
                : 'assets/default-avatar.jpg'" (error)="onImageError($event)" alt="avatar"
            style="border-radius:10%; width:220px; height:220px; object-fit:cover;" />
    </div>
    <div class="d-flex flex-column gap-2">
        <div><strong>Usuario:</strong> {{ perfilData.username }}</div>
        <div><strong>Alias:</strong> {{ perfilData.alias }}</div>
        <div><strong>Correo:</strong> {{ perfilData.email }}</div>
        <div><strong>Género:</strong> {{ perfilData.genero }}</div>
        <div><strong>Fecha de nacimiento:</strong> {{ perfilData?.fecha_nacimiento }}</div>
        <div><strong>Idioma:</strong> {{ perfilData.idioma }}</div>
        <div><strong>Estado:</strong> {{ perfilData.estado }}</div>
    </div>
    <div class="d-flex gap-3 mt-4">
        <a routerLink="/chat" class="btn btn-primary">Regresar</a>
        <a routerLink="/editar-perfil" class="btn btn-info">Editar</a>    
        <button class="btn btn-danger" (click)="cerrarSesion()">Cerrar sesión</button>
    </div>
</div>
