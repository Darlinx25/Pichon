<div id="formulario" class="p-3 d-flex flex-column justify-content-center align-items-center">
    <h1 class="p-3">REGISTRARSE</h1>
    <p style="color: green;" *ngIf="successMessage">{{ successMessage }}</p>
    <p style="color: red;" *ngIf="errorMessage">{{ errorMessage }}</p>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="title">Usuario</label>
            <div class="w-75">
                <input class="form-control" id="username" formControlName="username" type="text" />
            </div>
        </div>
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="title">Alias</label>
            <div class="w-75">
                <input class="form-control" id="alias" formControlName="alias" type="text" />
            </div>
        </div>
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="description">Contraseña</label>
            <div class="w-75">
                <input class="form-control" id="password" formControlName="password" type="password" />
            </div>
        </div>
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="description">Confirmar contraseña</label>
            <div class="w-75">
                <input class="form-control" id="confirmPassword" formControlName="confirmPassword" type="password" />
            </div>
        </div>
        <div class="d-flex gap-3 mb-3">
            <label for="imagen">Imagen de perfil:</label>
            <input type="file" id="imagen" (change)="onFileSelected($event)" accept="image/*">
        </div>

        <div class="d-flex justify-content-end">
            <button class="btn btn-primary" [disabled]="!registerForm.valid" type="submit">Registrarse</button>
        </div>
    </form>
    <a style="color: rgb(43, 43, 206);" routerLink="">¿Ya tienes cuenta?</a>
</div>
