<div id="formulario" class="p-3 d-flex flex-column justify-content-center align-items-center">
    <h1 class="p-3">REGISTER</h1>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="title">username</label>
            <div class="w-75">
                <input class="form-control" id="username" formControlName="username" type="text" />
            </div>
        </div>
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="title">email</label>
            <div class="w-75">
                <input class="form-control" id="email" formControlName="email" type="email" />
            </div>
        </div>
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="description">password</label>
            <div class="w-75">
                <input class="form-control" id="password" formControlName="password" type="password" />
            </div>
        </div>
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="description">confirm password</label>
            <div class="w-75">
                <input class="form-control" id="confirmPassword" formControlName="confirmPassword" type="password" />
            </div>
        </div>
        <div class="d-flex justify-content-end">
            <button class="btn btn-primary" [disabled]="!registerForm.valid" type="submit">register</button>
        </div>
    </form>
</div>
