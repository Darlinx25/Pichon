<div id="formulario" class="p-3 d-flex flex-column justify-content-center align-items-center">
    <h1 class="p-3">REGISTRARSE</h1>
    <p class="text-success" *ngIf="successMessage">{{ successMessage }}</p>
    <p class="text-danger" *ngIf="errorMessage">{{ errorMessage }}</p>
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
        <div class="upload-zone border border-2 border-primary border-dashed rounded-4 p-4 text-center bg-light shadow-sm mx-auto mb-4"
            style="max-width: 500px;" (dragover)="onDragOver($event)" (dragleave)="onDragLeave($event)"
            (drop)="onDrop($event)">

            <div class="upload-overlay" *ngIf="isDragging">
                <div class="text-center">
                    <i class="bi bi-cloud-arrow-up-fill fs-1 d-block mb-2"></i>
                    <div>Soltar para subir imagen</div>
                </div>
            </div>

            <img [src]="imagePreview || 'assets/default-avatar.jpg'" alt="avatar"
                class="avatar-preview rounded-4 shadow mb-3">

            <i class="bi bi-cloud-arrow-up fs-1 text-primary"></i>

            <h5 class="fw-bold mt-2">
                Imagen de perfil
            </h5>

            <p class="text-muted">
                Arrastra una imagen aquí o selecciona un archivo
            </p>

            <label class="btn btn-outline-primary">
                Elegir imagen
                <input hidden type="file" accept="image/*" (change)="onFileSelected($event)">
            </label>

        </div>
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="title">Usuario</label>
            <div class="w-75">
                <input class="form-control" id="username" formControlName="username" type="text" />
            </div>
        </div>
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="title">Email</label>
            <div class="w-75">
                <input class="form-control" id="email" formControlName="email" type="email" />
            </div>
        </div>
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="title">Alias</label>
            <div class="w-75">
                <input class="form-control" id="alias" formControlName="alias" type="text" />
            </div>
        </div>
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="description">Contraseña</label>
            <div class="w-75">
                <input class="form-control" id="password" formControlName="password" type="password" />
            </div>
        </div>
        <div class="d-flex gap-3 mb-3">
            <label class="form-label w-25" for="description">Confirmar contraseña</label>
            <div class="w-75">
                <input class="form-control" id="confirmPassword" formControlName="confirmPassword" type="password" />
            </div>
        </div>
        <div class="d-flex justify-content-end">
            <button class="btn btn-primary" [disabled]="!registerForm.valid" type="submit">Registrarse</button>
        </div>
    </form>
    <a class="link-primary" routerLink="/login">¿Ya tienes cuenta?</a>
</div>
