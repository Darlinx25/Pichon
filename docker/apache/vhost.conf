<VirtualHost *:80>
    DocumentRoot /var/www/html
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        LimitRequestBody 0
        FallbackResource /index.html
    </Directory>
    ProxyPass /ws/ ws://websocket-server:8081/
    ProxyPass /ws ws://websocket-server:8081/          
    ProxyPassReverse /ws/ ws://websocket-server:8081/
    ProxyPassReverse /ws ws://websocket-server:8081/  
</VirtualHost>